name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: build (${{ matrix.ros_distro }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        ros_distro: [humble]   # keep in sync with the consumer repos' CI matrix
    container:
      image: ros:${{ matrix.ros_distro }}-ros-base
    steps:
      # Check the package out UNDER a workspace src/ dir so colcon discovers it
      # exactly the way the consumer repos do (as src/g1_onboard_msgs).
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: src/g1_onboard_msgs

      - name: Install build tooling
        shell: bash
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            python3-colcon-common-extensions \
            python3-rosdep
          rosdep init || true
          rosdep update

      - name: rosdep install
        shell: bash
        run: |
          source /opt/ros/${{ matrix.ros_distro }}/setup.bash
          rosdep install --from-paths src --ignore-src -r -y || true

      - name: colcon build
        shell: bash
        run: |
          source /opt/ros/${{ matrix.ros_distro }}/setup.bash
          colcon build --cmake-args -DCMAKE_BUILD_TYPE=RelWithDebInfo

      - name: interface sanity check
        shell: bash
        run: |
          source /opt/ros/${{ matrix.ros_distro }}/setup.bash
          source install/setup.bash
          echo "Generated interfaces:"
          ros2 interface list | grep g1_onboard_msgs
          # Fail if any expected message is missing from the generated typesupport.
          for m in JointCmd JointCmdChunk AudioPCM BufState LocoCommand EstopFlag SpeakerState; do
            ros2 interface show "g1_onboard_msgs/msg/$m" > /dev/null \
              || { echo "::error::missing generated interface: $m"; exit 1; }
          done
