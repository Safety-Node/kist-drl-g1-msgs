# PR meta gate -- enforces branch naming + PR title format.
# Identical policy to kist-drl-g1-workstation / kist-drl-g1-onboard so all three
# repos share one convention.
#
# Pairs with the repo's "Squash and merge only" setting: the PR title becomes
# the squash commit message on main.
#
# Required status checks (set in branch protection):
#   - branch-name
#   - pr-title
name: PR meta

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  branch-name:
    name: branch-name
    runs-on: ubuntu-latest
    steps:
      - name: Check pattern
        env:
          BRANCH: ${{ github.head_ref }}
        run: |
          if [[ ! "$BRANCH" =~ ^(TASK-[0-9]+|chore/.+)$ ]]; then
            echo "::error::Branch name '$BRANCH' must match TASK-{number} (Notion-linked work) or chore/{description} (non-task housekeeping)"
            echo ""
            echo "Examples that pass:"
            echo "  TASK-58"
            echo "  chore/bump-g1-msgs-v0-2-0"
            echo "  chore/add-lidar-health-msg"
            echo ""
            echo "Examples that fail:"
            echo "  TASK-58-add-msg   (suffix not allowed)"
            echo "  feature/msg       (wrong prefix)"
            echo "  task-58           (lowercase 'task')"
            exit 1
          fi
          echo "Branch name OK: $BRANCH"

  pr-title:
    name: pr-title
    runs-on: ubuntu-latest
    steps:
      - name: Check pattern
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          # Format: ([TASK-{number}] | [chore]) <type>(<scope>)?: <lowercase subject>
          re='^(\[TASK-[0-9]+\]|\[chore\]) (feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([a-z0-9_-]+\))?!?: [a-z].+$'
          if [[ ! "$TITLE" =~ $re ]]; then
            echo "::error::PR title '$TITLE' must match: ([TASK-{number}] | [chore]) <type>(<scope>)?: <lowercase subject>"
            echo ""
            echo "Examples that pass:"
            echo "  [TASK-58] feat(msgs): add LidarHealth message"
            echo "  [chore] docs(readme): clarify submodule path"
            echo "  [chore] chore(msgs): bump nothing, tidy comments"
            echo ""
            echo "Examples that fail:"
            echo "  feat(msgs): add ...          (missing [TASK-{n}] or [chore] prefix)"
            echo "  [chore] Feat(msgs): add ...  (type must be lowercase, from the allowed set)"
            echo "  [chore] feat(Msgs): add ...  (scope must be lowercase)"
            exit 1
          fi
          echo "PR title OK: $TITLE"
