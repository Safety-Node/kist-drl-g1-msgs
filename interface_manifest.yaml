# interface_manifest.yaml — SSOT for the PC <-> NX wire contract (/bridge/* topics).
#
# This is the CANONICAL definition (per Notion ICD + the PC publisher code).
# Each consumer validates its own endpoints against this file:
#   * onboard  — comm_bridge relay table (comm_bridge_params.yaml)
#   * PC       — UnitreeG1Provider publishers/subscribers (introspection)
# It is versioned together with the .msg definitions in this repo, so a wire
# change and its type change move as one release.
#
# Keyed by the /bridge/* topic (the PC<->NX boundary). Direction is from the
# PC's point of view. QoS is the network-facing (domain-1) setting.
version: 0.1.0

interfaces:
  # ===== Commands: PC -> NX (comm_bridge inbound) — RELIABLE =====
  - topic: /bridge/cmd/arm
    type: g1_onboard_msgs/msg/JointCmdChunk      # canonical wire (ICD IF-50 / CONV-006); NX unpacks chunk -> 100 Hz
    qos: reliable
    direction: pc_to_nx
    source: UnitreeG1Provider
    target: comm_bridge
  - topic: /bridge/cmd/low
    type: g1_onboard_msgs/msg/JointCmdChunk
    qos: reliable
    direction: pc_to_nx
    source: UnitreeG1Provider
    target: comm_bridge
  - topic: /bridge/cmd/vel
    type: geometry_msgs/msg/Twist
    qos: reliable
    direction: pc_to_nx
    source: NavigationProvider
    target: comm_bridge
  - topic: /bridge/cmd/loco
    type: g1_onboard_msgs/msg/LocoCommand
    qos: reliable
    direction: pc_to_nx
    source: MoveConnector
    target: comm_bridge
  - topic: /bridge/cmd/audio_out
    type: g1_onboard_msgs/msg/AudioPCM
    qos: reliable
    direction: pc_to_nx
    source: TTSProvider
    target: comm_bridge

  # ===== Sensor streams: NX -> PC (comm_bridge outbound) — BEST_EFFORT =====
  - topic: /bridge/sensors/audio_pcm
    type: g1_onboard_msgs/msg/AudioPCM
    qos: reliable            # network pub is reliable (qos_pub); PC sub best_effort is compatible
    direction: nx_to_pc
    source: comm_bridge
    target: STTProvider
  - topic: /bridge/sensors/joint_states
    type: sensor_msgs/msg/JointState
    qos: best_effort
    direction: nx_to_pc
    source: comm_bridge
    target: UnitreeG1Provider
  - topic: /bridge/sensors/imu
    type: sensor_msgs/msg/Imu
    qos: best_effort
    direction: nx_to_pc
    source: comm_bridge
    target: UnitreeG1Provider
  - topic: /bridge/sensors/imu/ankle_left
    type: sensor_msgs/msg/Imu
    qos: best_effort
    direction: nx_to_pc
    source: comm_bridge
    target: UnitreeG1Provider
  - topic: /bridge/sensors/imu/ankle_right
    type: sensor_msgs/msg/Imu
    qos: best_effort
    direction: nx_to_pc
    source: comm_bridge
    target: UnitreeG1Provider
  - topic: /bridge/sensors/uwb_pose
    type: geometry_msgs/msg/PoseStamped
    qos: best_effort
    direction: nx_to_pc
    source: comm_bridge
    target: UnitreeG1Provider
  - topic: /bridge/sensors/odom
    type: nav_msgs/msg/Odometry
    qos: best_effort
    direction: nx_to_pc
    source: comm_bridge
    target: UnitreeG1Provider
  - topic: /bridge/sensors/location
    type: geometry_msgs/msg/PoseStamped
    qos: best_effort
    direction: nx_to_pc
    source: comm_bridge
    target: NavigationProvider
  - topic: /bridge/sensors/location/diagnostics
    type: diagnostic_msgs/msg/DiagnosticStatus
    qos: best_effort
    direction: nx_to_pc
    source: comm_bridge
    target: UnitreeG1Provider
  - topic: /bridge/sensors/lidar/points
    type: sensor_msgs/msg/PointCloud2
    qos: best_effort
    direction: nx_to_pc
    source: comm_bridge
    target: NavigationProvider
  - topic: /bridge/sensors/lidar/occupancy
    type: nav_msgs/msg/OccupancyGrid
    qos: best_effort
    direction: nx_to_pc
    source: comm_bridge
    target: UnitreeG1Provider
  - topic: /bridge/sensors/lidar/filtered_points
    type: sensor_msgs/msg/PointCloud2
    qos: best_effort
    direction: nx_to_pc
    source: comm_bridge
    target: UnitreeG1Provider

  # ===== State reports: NX -> PC — RELIABLE =====
  - topic: /bridge/motor/buf_state
    type: g1_onboard_msgs/msg/BufState
    qos: reliable
    direction: nx_to_pc
    source: comm_bridge
    target: UnitreeG1Provider
  - topic: /bridge/audio/speaker_state
    type: g1_onboard_msgs/msg/SpeakerState
    qos: reliable
    direction: nx_to_pc
    source: comm_bridge
    target: STTProvider
  - topic: /bridge/safety/estop
    type: g1_onboard_msgs/msg/EstopFlag
    qos: reliable
    direction: nx_to_pc
    source: comm_bridge
    target: UnitreeG1Provider

  # ===== Camera: NX -> PC (camera_relay C++ node, NOT comm_bridge) — BEST_EFFORT =====
  - topic: /bridge/sensors/color/compressed
    type: sensor_msgs/msg/CompressedImage
    qos: best_effort
    direction: nx_to_pc
    source: camera_relay
    target: UnitreeG1Provider
  - topic: /bridge/sensors/depth/compressedDepth
    type: sensor_msgs/msg/CompressedImage
    qos: best_effort
    direction: nx_to_pc
    source: camera_relay
    target: UnitreeG1Provider
    note: "PC currently subscribes /bridge/sensors/depth/image_raw (sensor_msgs/Image) — topic+type mismatch (C-2)."
